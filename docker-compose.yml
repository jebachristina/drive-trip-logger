version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: drive-trip-logger-db
    environment:
      POSTGRES_DB: drive_trip_logger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-services-drive-trip
      dockerfile: Dockerfile
    container_name: drive-trip-logger-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/drive_trip_logger
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-webapp-drive-trip
      dockerfile: Dockerfile
    container_name: drive-trip-logger-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080

volumes:
  postgres_data: